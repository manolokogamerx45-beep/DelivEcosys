org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Fix: Kotlin incremental compilation fails when project (D:) and pub cache (C:) are on different drives
kotlin.incremental=false
# Run Kotlin compiler in-process (no separate Kotlin daemon JVM)
kotlin.compiler.execution.strategy=in-process
# Single worker to minimize RAM usage
org.gradle.workers.max=1
# Disable Gradle daemon to avoid background JVM keeping memory
org.gradle.daemon=false
